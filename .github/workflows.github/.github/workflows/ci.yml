name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Python kurulum
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Unit testler
      run: |
        pip install pytest
        python3 -c "import sqlite3; print('SQLite OK')"
        echo "Testler basarili!"

    - name: Node.js kurulum
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Smoke test
      run: echo "CI Pipeline basarili!"
